# Service metadata and port properties
spring.application.name=user-login-registration-api
server.port=8084

# Spring TLS Security
server.ssl.key-alias=pacs
server.ssl.key-store=classpath:pacs.jks
server.ssl.key-store-password=pacsSystem
server.ssl.key-store-type=JKS

## Spring Client properties
#spring.boot.admin.client.url=http://localhost:9090

## Application Information
#management.info.env.enabled=true
#info.name=User Login/Registration API
#info.description=This is an API to provide user login and registration for the system
#info.version=1.0

## Exposed Actuator endpoints
#management.endpoints.web.exposure.include=*
#management.endpoints.web.exposure.exclude=beans, heapdump, configprops
#
## Further Actuator Customization
#management.endpoint.health.show-details=always
#management.endpoint.env.show-values=always
